name: BuildersUtilities
description: ${description}
authors: [ TehBrian, Arcaniax ]
website: https://github.com/TehBrian/BuildersUtilities

softdepend: [ PlotSquared, WorldGuard ]

version: ${version}
main: dev.tehbrian.buildersutilities.BuildersUtilities
api-version: "1.21"

permissions:
  buildersutilities.ability:
    description: Permission to open the ability menu.
    default: true
  buildersutilities.advancedfly:
    description: Permission to use advanced fly.
    default: op
  buildersutilities.armorcolor:
    description: Permission to open the armor color creator.
    default: true
  buildersutilities.banner:
    description: Permission to open the banner creator.
    default: true
  buildersutilities.bloc:
    description: Permission to open the special items menu.
    default: true
  buildersutilities.build:
    description: Permission to use build helper commands.
    default: true
  buildersutilities.doubleslabbreak:
    description: Permission to use double slab break.
    default: true
  buildersutilities.glazedterracottarotate:
    description: Permission to use glazed terracotta rotate.
    default: true
  buildersutilities.irondoortoggle:
    description: Permission to use iron door toggle.
    default: true
  buildersutilities.nightvision:
    description: Permission to use night vision.
    default: true
  buildersutilities.noclip:
    description: Permission to use noclip.
    default: op
  buildersutilities.rc:
    description: Permission to run /bu rc.
    default: op
  buildersutilities.reload:
    description: Permission to run /bu reload.
    default: op
  buildersutilities.special:
    description: Permission to open the special items menu.
    default: true
  buildersutilities.spectate.entity:
    description: Permission to spectate entities.
    default: true
    children:
      buildersutilities.spectate.player: true
  buildersutilities.spectate.player:
    description: Permission to spectate players.
    default: true
  buildersutilities.spectate.teleport:
    description: Permission to teleport via spectator menu.
    default: true
  buildersutilities.waypoint:
    description: Permission to use waypoints.
    default: true
  buildersutilities.worldedit-aliases:
    description: Permission to use WorldEdit aliases.
    default: true
